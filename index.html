<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Feedback</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .feedback-card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .scale-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-bottom: 2.5rem;
            padding: 0 10px;
        }

        /* Connecting line behind dots */
        .scale-container::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 4px;
            background-color: #e0e0e0;
            z-index: 1;
        }

        .dot-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.95rem;
            color: #7f8c8d;
            transition: all 0.2s ease;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .dot-wrapper:hover .dot {
            border-color: #3498db;
            color: #3498db;
            transform: scale(1.1);
        }

        .dot-wrapper.selected .dot {
            background-color: #3498db;
            border-color: #3498db;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .labels {
            display: flex;
            justify-content: space-between;
            color: #95a5a6;
            font-size: 0.85rem;
            margin-top: -1.5rem;
            margin-bottom: 2.5rem;
            padding: 0 15px;
            font-weight: 500;
        }

        .btn-container {
            height: 50px; /* Prevents layout shifting when button appears */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        button.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        button:hover {
            background-color: #27ae60;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3);
        }

        #statusMessage {
            margin-top: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="feedback-card" id="cardContent">
    <h2>Do you like our English classes?</h2>
    
    <div class="scale-container" id="scale">
        <!-- Dots 0 to 10 dynamically generated by JS -->
    </div>

    <div class="labels">
        <span>Not at all</span>
        <span>Absolutely!</span>
    </div>

    <div class="btn-container">
        <button id="sendBtn">Send Results</button>
    </div>

    <div id="statusMessage"></div>
</div>

<script>
    const TELEGRAM_CHAT_ID = '1385220815';
    const TELEGRAM_BOT_TOKEN = '7316734712:AAH6nwcCUtvqFCDDO-1Sx_xHtxsvYuQ5O54';
    
    const scaleContainer = document.getElementById('scale');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMessage');
    let selectedValue = null;

    // 1. Generate the 0-10 scale dots
    for (let i = 0; i <= 10; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'dot-wrapper';
        wrapper.dataset.value = i;

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.textContent = i;

        wrapper.appendChild(dot);
        scaleContainer.appendChild(wrapper);

        // Handle dot selection
        wrapper.addEventListener('click', function() {
            document.querySelectorAll('.dot-wrapper').forEach(el => el.classList.remove('selected'));
            this.classList.add('selected');
            selectedValue = this.dataset.value;
            
            // Reveal the send button smoothly
            sendBtn.classList.add('show');
        });
    }

    // 2. Handle data submission to Telegram
    sendBtn.addEventListener('click', function() {
        if (selectedValue === null) return;

        const message = `📊 *New Class Feedback*\n\n*Score:* ${selectedValue} / 10`;
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

        sendBtn.disabled = true;
        statusDiv.style.color = '#7f8c8d';
        statusDiv.textContent = 'Sending...';

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        })
        .then(response => {
            if (response.ok) {
                statusDiv.style.color = '#2ecc71';
                statusDiv.textContent = 'Thank you! Your feedback has been sent.';
                
                // Optional: Hide form content after successful submission
                setTimeout(() => {
                    document.getElementById('cardContent').innerHTML = `
                        <h2 style="color: #2ecc71; margin-bottom: 0;">✓ Feedback Submitted</h2>
                        <p style="color: #7f8c8d; margin-top: 10px;">Have a great day!</p>
                    `;
                }, 1000);
            } else {
                throw new Error('Telegram API Error');
            }
        })
        .catch(error => {
            statusDiv.style.color = '#e74c3c';
            statusDiv.textContent = 'Error sending feedback. Please try again.';
            sendBtn.disabled = false;
            console.error(error);
        });
    });
</script>

</body>
</html>
